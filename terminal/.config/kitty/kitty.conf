background_opacity      0.7
# BEGIN_KITTY_FONTS
font_family             family="CaskaydiaCove Nerd Font"
bold_font               auto
italic_font             auto
bold_italic_font        auto
# END_KITTY_FONTS
font_size               12
window_padding_width    5

map ctrl+shift+enter    new_os_window_with_cwd
map ctrl+insert         copy_to_clipboard
map shift+kp_insert     paste_from_selection
